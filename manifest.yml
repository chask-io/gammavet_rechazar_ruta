function:
  name: RechazarRutaFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Registra que un conductor de Gammavet rechaza o no puede operar la ruta.
    Marca al conductor como no disponible, envia acuse por WhatsApp y cierra la
    sesion de orquestacion. No inicia ni completa paradas.
  timeout: 120
  memory_size: 256
  layers:
    - foundationMinimal
    - foundationApi

  parameters:
    required: []
    optional:
      - name: driver_id
        type: string
        description: ID del conductor si esta disponible.
      - name: driver_phone
        type: string
        description: Telefono WhatsApp del conductor si esta disponible.
      - name: nota
        type: string
        description: Motivo opcional del rechazo.
      - name: ticket_id
        type: string
        description: ID opcional de ticket o sesion para correlacion.

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false

  data:
    reads:
      - table: gammavet_test.drivers
        columns: [id, phone, availability, paused, active]
    writes:
      - table: gammavet_test.drivers
        mode: update
        columns: [availability, paused, updated_at]
      - table: gammavet_test.dispatch_events
        mode: insert
        columns: [event_type, actor_lambda, driver_id, orchestration_event_uuid, metadata]
    rpc:
      - POST /api/gammavet/drivers/update
